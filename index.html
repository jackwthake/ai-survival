<!DOCTYPE html>
<html>
<head>
  <title>sim</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // Helper to update the UI sidebar
    function switchTab(agentId, tab) {
      const thoughts = document.getElementById(`thoughts-${agentId}-thoughts`)
      const memory = document.getElementById(`thoughts-${agentId}-memory`)
      const btns = document.querySelectorAll(`#thoughts-${agentId} .tab-btn`)
      
      thoughts.classList.toggle('active', tab === 'thoughts')
      memory.classList.toggle('active', tab === 'memory')
      btns.forEach((b, i) => b.classList.toggle('active', 
        (i === 0 && tab === 'thoughts') || (i === 1 && tab === 'memory')))
    }
  </script>
</head>
<body>
  <div id="layout">
    <h3 id="world-label">World</h3>
    <canvas id="world"></canvas>
    <div id="sidebar">
      <div id="thoughts-A" class="agent-log">
        <div class="agent-header" style="color: #0ff">Thadeus's Mind</div>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('A', 'thoughts')">Thoughts</button>
          <button class="tab-btn" onclick="switchTab('A', 'memory')">Memory</button>
        </div>
        <div id="thoughts-A-thoughts" class="tab-content active"></div>
        <div id="thoughts-A-memory" class="tab-content hidden"></div>
      </div>

      <div id="thoughts-B" class="agent-log">
        <div class="agent-header" style="color: #ff0">Bertrand's Mind</div>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('B', 'thoughts')">Thoughts</button>
          <button class="tab-btn" onclick="switchTab('B', 'memory')">Memory</button>
        </div>
        <div id="thoughts-B-thoughts" class="tab-content active"></div>
        <div id="thoughts-B-memory" class="tab-content hidden"></div>
      </div>
      <input id="chat-input" type="text" placeholder="Chat with Thadeus and Bertrand...">
    </div>
  </div>
  <script src="main.js" type="module"></script>
  <script type="module" src="world.js"></script>
  <script src="noise.js" type="module"></script>
</body>
</html>
